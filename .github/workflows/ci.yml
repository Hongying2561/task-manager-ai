name: Node.js CI

on:
  push:
    branches:
      - main
      - feature/backend
  pull_request:
    branches:
      - main
      - feature/backend
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Verify Node.js app command
        run: node -e "console.log('Basic Node.js command succeeded')"


